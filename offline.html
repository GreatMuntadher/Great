<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رحلة التعافي — بدون إنترنت</title>
  <style>
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{
      font-family: 'Cairo', 'Segoe UI', sans-serif;
      background: #13111e;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container{
      text-align: center;
      max-width: 420px;
    }
    .icon{ font-size: 72px; margin-bottom: 24px; }
    h1{ font-size: 22px; font-weight: 800; margin-bottom: 12px; color: #fff; }
    p{ font-size: 14px; color: #94a3b8; line-height: 2; margin-bottom: 24px; }
    .note{
      background: rgba(79,142,247,.1);
      border: 1px solid rgba(79,142,247,.25);
      border-radius: 14px;
      padding: 16px 20px;
      font-size: 13px;
      color: #93c5fd;
      line-height: 1.9;
      margin-bottom: 24px;
    }
    button{
      background: linear-gradient(135deg,#4f8ef7,#43d98d);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover{ opacity: 0.88; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌱</div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>التطبيق يحتاج اتصالاً أول مرة لتحميل الموارد.<br>بعد ذلك سيعمل بشكل كامل حتى بدون إنترنت.</p>
    <div class="note">
      ✅ بياناتك محفوظة محلياً على جهازك ولم تتأثر.<br>
      🔄 حاول الاتصال بالإنترنت ثم أعد تحميل الصفحة.
    </div>
    <button onclick="window.location.reload()">🔄 إعادة المحاولة</button>
  </div>
</body>
</html>
